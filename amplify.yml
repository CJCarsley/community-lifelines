version: 1
backend:
  phases:
    build:
      commands:
        # Deploy the Gen 2 backend (auth, data, age-token, age-proxy) for this
        # branch, then generate amplify_outputs.json for the frontend build.
        # Use `npm install` (not `npm ci`): the backend toolchain (aws-cdk-lib,
        # cdk-from-cfn native binaries, @smithy/*) trips npm's optional-dependency
        # lockfile bug, which makes strict `npm ci` reject an otherwise-good lock.
        - npm install --legacy-peer-deps
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm install --legacy-peer-deps
    build:
      commands:
        - NODE_OPTIONS=--max-old-space-size=7168 npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
